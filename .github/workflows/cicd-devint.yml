# For developer
name: Deploy for devint
on:
  push:
    branches:
      - develop
      - feat/**
      - fea/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  publish_image:
    name: Publish Docker image
    uses: './.github/workflows/docker-publish.yml'
    secrets: inherit
    with:
      tags: mocachain/moca-callisto:develop


  deploy_with_k8s:
    runs-on: ubuntu-latest
    needs: publish_image
    steps:
      - name: "Deploy new StatefulSet"
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBECONFIG_DEV }}
        with:
          args: -n moca-dev rollout restart deployment moca-callisto-bdjuno

      - name: "Check StatefulSet"
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBECONFIG_DEV }}
        with:
          args: -n moca-dev rollout status deployment moca-callisto-bdjuno --timeout=600s
